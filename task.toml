[task]
name = "cipher/manifestlane-shared-file-boundary"
description = "ManifestLane is running at `http://www.manifestlane.com:8080/`, and its source code is in `/app/manifestlane`. Sign in with `reviewer` / `manifestlane-review` to use the UI.\n\nA shipping partner reported that a shared file link opened the expected packing memo at first, but after they retried the request with a changed numeric value it returned a memo from another customer. The same kind of wrong-customer file response was seen by an API client while retrying a failed download.\n\nPatch the source in place. Keep sign-in, dashboard, document search, document detail pages, shared file links, API token downloads, and memo uploads working as they do now.\n\nUseful local service notes are at `/app/SERVICE_NOTES.md`. Scope is limited to this local service and source tree. Do not remove file downloads, disable shared links, disable API token downloads, or special case the seeded examples."

[metadata]
category = "access_control_auth"
difficulty = "hard"

[environment]
allow_internet = false
workdir = "/app"

[agent]
user = "appuser"
