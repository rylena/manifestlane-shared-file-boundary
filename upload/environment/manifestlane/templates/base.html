<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ManifestLane{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
  </head>
  <body>
    <header class="topbar">
      <strong>ManifestLane</strong>
      {% if g.user %}
        <nav>
          <a href="{{ url_for('documents.dashboard') }}">Dashboard</a>
          <a href="{{ url_for('documents.search') }}">Search</a>
        </nav>
        <form action="{{ url_for('auth.logout') }}" method="post">
          <button type="submit">Sign out</button>
        </form>
      {% endif %}
    </header>
    <main class="shell">
      {% for message in get_flashed_messages() %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
      {% block body %}{% endblock %}
    </main>
  </body>
</html>
